spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lookjobs}
    username: postgres
    password: root123
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:ChangeThisToA256BitSecretForProductionChangeThis}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors-origin: ${CORS_ORIGIN:http://localhost:5173}
  jobs:
    api:
      base-url: ${JOBS_API_BASE_URL:https://remotive.com/api/remote-jobs}
      key: ${JOBS_API_KEY:}

logging:
  level:
    org.springframework.security: INFO
